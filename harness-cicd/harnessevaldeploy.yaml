pipeline:
  name: harness-eval-deploy
  identifier: harnessevaldeploy
  tags: {}
  template:
    templateRef: jpbartodeploymenttemplate
    versionLabel: v1
    templateInputs:
      stages:
        - insert:
            identifier: Deploy
            stages:
              - stage:
                  name: CustomDeploy
                  identifier: CustomDeploy
                  description: ""
                  type: Custom
                  spec:
                    execution:
                      steps:
                        - step:
                            type: ShellScript
                            name: ShellScript_1
                            identifier: ShellScript_1
                            spec:
                              shell: Bash
                              executionTarget: {}
                              source:
                                type: Inline
                                spec:
                                  script: echo preparing to install harness eval
                              environmentVariables: []
                              outputVariables: []
                            timeout: 10m
                  tags: {}
              - stage:
                  name: SerialDeployK8s
                  identifier: SerialDeployK8s
                  description: ""
                  type: Deployment
                  spec:
                    deploymentType: Kubernetes
                    service:
                      serviceRef: harnessevalservice
                      disableArtifactValidation: true
                    environment:
                      environmentRef: jpbartoenv
                      deployToAll: false
                      infrastructureDefinitions:
                        - identifier: jpbartok8sinfra
                    execution:
                      steps:
                        - step:
                            name: Stage Deployment
                            identifier: stageDeployment
                            type: K8sBlueGreenDeploy
                            timeout: 10m
                            spec:
                              skipDryRun: false
                              pruningEnabled: false
                        - step:
                            name: Swap primary with stage service
                            identifier: bgSwapServices
                            type: K8sBGSwapServices
                            timeout: 10m
                            spec:
                              skipDryRun: false
                      rollbackSteps:
                        - step:
                            name: Swap primary with stage service
                            identifier: rollbackBgSwapServices
                            type: K8sBGSwapServices
                            timeout: 10m
                            spec:
                              skipDryRun: false
                  tags: {}
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: StageRollback
  projectIdentifier: harnessdeployeval
  orgIdentifier: pismo
