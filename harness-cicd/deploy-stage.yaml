pipeline:
  name: deploy-stage
  identifier: deploystage
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: Deploy Harness Eval
        identifier: Deploy_Harness_Eval
        description: ""
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: ShellScript_1
                  identifier: ShellScript_1
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |-
                          echo shell script 1
                          echo read stage input variable $MY_INPUT_VAR
                    environmentVariables:
                      - name: MY_INPUT_VAR
                        type: String
                        value: <+pipeline.stages.Preparation.spec.execution.steps.GetDeployStage.output.outputVariables.DeployStageInputVar>
                    outputVariables: []
                  timeout: 10m
        tags: {}
    - stage:
        name: Deploy Eval Stage 2
        identifier: Deploy_Eval_Stage_2
        description: ""
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: ShellScript_1
                  identifier: ShellScript_1
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: echo Shell script 2
                    environmentVariables: []
                    outputVariables: []
                  timeout: 10m
        tags: {}
    - stage:
        name: install guestbook
        identifier: install_guestbook
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: <+org.default_project.guestbook_service>
          environment:
            environmentRef: account.jpbartoacctlocalenv
            deployToAll: false
            infrastructureDefinitions:
              - identifier: jpbartoacctlocalk8s
          execution:
            steps:
              - step:
                  name: Rollout Deployment
                  identifier: rolloutDeployment
                  type: K8sRollingDeploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
            rollbackSteps:
              - step:
                  name: Rollback Rollout Deployment
                  identifier: rollbackRolloutDeployment
                  type: K8sRollingRollback
                  timeout: 10m
                  spec:
                    pruningEnabled: false
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
  variables:
    - name: MyInputVar
      type: String
      description: ""
      required: true
      value: <cicd:squad.app.value>
