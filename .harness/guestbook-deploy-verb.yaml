pipeline:
  name: guestbook-deploy-verb
  identifier: guestbookdeployverb
  tags: {}
  projectIdentifier: jpbartoapplication
  orgIdentifier: default
  stages:
    - stage:
        name: Deploy Terraform
        identifier: Deploy_Terraform
        description: ""
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: TerraformApply
                  name: TerraformApply_1
                  identifier: TerraformApply_1
                  spec:
                    provisionerIdentifier: tmp_provisioner
                    configuration:
                      type: Inline
                      spec:
                        configFiles:
                          store:
                            spec:
                              connectorRef: account.jpbartogithubconnector
                              repoName: harness-eval
                              gitFetchType: Branch
                              branch: main
                              folderPath: /terraform
                            type: Github
                        providerCredential:
                          type: Aws
                          spec:
                            connectorRef: account.jpbartoawsvpocconnector
                            region: eu-west-1
                            roleArn: ""
                        vars:
                          - name: env_name
                            value: <+pipeline.variables.EnvironmentRef>
                            type: String
                          - name: harness_account_id
                            value: <+account.identifier>
                            type: String
                          - name: harness_gitops_agent_id
                            value: <+pipeline.variables.GitOpsAgentId>
                            type: String
                          - name: harness_gitops_repo_id
                            value: <+pipeline.variables.GitOpsRepoId>
                            type: String
                        envVars:
                          - name: HARNESS_PLATFORM_API_KEY
                            value: <+secrets.getValue("account.jpbarto-coderio-svc-token")>
                            type: Secret
                  timeout: 10m
        tags: {}
    - stage:
        name: Deploy Helm Chart
        identifier: Deploy_Helm_Chart
        description: ""
        type: Deployment
        spec:
          deploymentType: NativeHelm
          environment:
            environmentRef: <+pipeline.variables.EnvironmentRef>
            deployToAll: false
            infrastructureDefinitions:
              - identifier: <+pipeline.variables.InfrastructureRef>
          service:
            serviceRef: org.jpbartoguestbookservice
          execution:
            steps:
              - step:
                  name: Helm Deployment
                  identifier: helmDeployment
                  type: HelmDeploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
            rollbackSteps:
              - step:
                  name: Helm Rollback
                  identifier: helmRollback
                  type: HelmRollback
                  timeout: 10m
                  spec: {}
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
        when:
          pipelineStatus: Success
  variables:
    - name: EnvironmentRef
      type: String
      description: "Harness environment identifier (e.g. us-east-1)"
      value: <+input>
    - name: InfrastructureRef
      type: String
      description: "Harness infrastructure definition identifier"
      value: <+input>
    - name: GitOpsAgentId
      type: String
      description: "Harness GitOps agent identifier"
      value: <+input>
    - name: GitOpsRepoId
      type: String
      description: "Harness GitOps repository connector identifier"
      value: <+input>
