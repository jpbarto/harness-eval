pipeline:
  name: guestbook-cd
  identifier: guestbookcd
  projectIdentifier: psmjpbarto_guestbook
  orgIdentifier: psmjpbarto
  tags: {}
  stages:
    - stage:
        name: Deploy Terraform
        identifier: Deploy_Terraform
        description: ""
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: TerraformApply
                  name: Apply Terraform
                  identifier: TerraformApply_1
                  spec:
                    provisionerIdentifier: tmp_provisioner
                    configuration:
                      type: Inline
                      spec:
                        configFiles:
                          store:
                            spec:
                              connectorRef: account.jpbartogithubconnector
                              repoName: harness-eval
                              gitFetchType: Branch
                              branch: <+pipeline.variables.AppRelease>
                              folderPath: terraform
                            type: Github
                        providerCredential:
                          type: Aws
                          spec:
                            connectorRef: org.psmjpbarto_cicacheconnector
                            region: us-east-1
                            roleArn: ""
                        environmentVariables:
                          - name: HARNESS_ACCOUNT_ID
                            value: <+account.identifier>
                            type: String
                          - name: HARNESS_PLATFORM_API_KEY
                            value: <+secrets.getValue("harness_platform_api_key")>
                            type: String
                        backendConfig:
                          type: Inline
                          spec:
                            content: |-
                              bucket = "jpbarto-awsvpoc-us-east-1-harness-tf-state"
                              key    = "psm-jpbarto/guestbook/state"
                              region = "us-east-1"
                        varFiles:
                          - varFile:
                              identifier: inline_tfvars
                              type: Inline
                              spec:
                                content: |-
                                  env_name                  = "<+pipeline.variables.EnvironmentRef>"
                                  harness_account_id        = "dLgVufj0RcmqCZSIwllL6g"
                                  harness_org_id            = "<+org.identifier>"
                                  harness_project_id        = "<+project.identifier>"
                                  harness_gitops_agent_id   = "<+pipeline.variables.GitOpsAgentId>"
                                  harness_gitops_cluster_id = "<+pipeline.variables.GitOpsClusterId>"
                                  gitops_target_revision    = "<+pipeline.variables.AppRelease>"
                                  gitops_target_namespace   = "<+variable.org.squadName>"
                  timeout: 10m
        tags: {}
        delegateSelectors:
          - jpbarto-aws-vpoc-delegate-us-east-1
    - stage:
        name: Sync ArgoCD
        identifier: Sync_ArgoCD
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          gitOpsEnabled: true
          execution:
            steps:
              - step:
                  type: GitOpsSync
                  name: GitOpsSync_1
                  identifier: GitOpsSync_1
                  spec:
                    prune: false
                    dryRun: false
                    applyOnly: false
                    forceApply: false
                    applicationsList:
                      - applicationName: guestbook-<+pipeline.variables.EnvironmentRef>
                        agentId: <+pipeline.variables.GitOpsAgentId>
                    retryStrategy: {}
                    retry: false
                    syncOptions:
                      skipSchemaValidation: false
                      autoCreateNamespace: false
                      pruneResourcesAtLast: false
                      applyOutOfSyncOnly: false
                      replaceResources: false
                      prunePropagationPolicy: foreground
                      respectIgnoreDifferences: false
                      serverSideApply: false
                  timeout: 10m
            rollbackSteps: []
          service:
            serviceRef: guestbook
          environment:
            environmentRef: account.jpbartoawsvpocenv
            deployToAll: true
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
        delegateSelectors:
          - jpbarto-aws-vpoc-delegate-us-east-1
    - stage:
        name: Gather Deployment Info
        identifier: Gather_Deployment_Info
        description: ""
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: Build Deployment Manifest
                  identifier: Build_Deployment_Manifest
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |-
                          SERVICE_NAME="guestbook-<+pipeline.variables.EnvironmentRef>-helm-guestbook"
                          NAMESPACE="<+variable.org.squadName>"

                          SERVICE_ENDPOINT=$(kubectl get service "${SERVICE_NAME}" -n "${NAMESPACE}" \
                            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
                          if [ -z "${SERVICE_ENDPOINT}" ]; then
                            SERVICE_ENDPOINT=$(kubectl get service "${SERVICE_NAME}" -n "${NAMESPACE}" \
                              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
                          fi

                          MANIFEST_JSON=$(cat <<EOF
                          {
                            "release": "<+pipeline.stages.Deploy_Terraform.spec.execution.steps.TerraformApply_1.output.gitops_application_release>",
                            "serviceEndpoint": "${SERVICE_ENDPOINT}",
                            "ssmParameterArn": "<+pipeline.stages.Deploy_Terraform.spec.execution.steps.TerraformApply_1.output.ssm_parameter_arn>"
                          }
                          EOF
                          )

                          export deploymentManifest=$(echo "${MANIFEST_JSON}" | base64 -w 0)
                    environmentVariables: []
                    outputVariables:
                      - name: deploymentManifest
                        type: String
                        value: deploymentManifest
                  timeout: 5m
        tags: {}
        delegateSelectors:
          - jpbarto-aws-vpoc-delegate-us-east-1
  variables:
    - name: AppRelease
      type: String
      description: Git tag or branch of the application to deploy (e.g. rel09)
      value: <+input>
    - name: EnvironmentRef
      type: String
      description: Harness environment identifier (e.g. us-east-1)
      value: <+input>
    - name: GitOpsAgentId
      type: String
      description: Harness GitOps agent identifier
      value: <+input>
    - name: GitOpsClusterId
      type: String
      description: Harness GitOps cluster identifier
      value: <+input>
